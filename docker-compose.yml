services:
  db:
    image: postgres:16-alpine
    container_name: ascend_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ascend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ascend}
      POSTGRES_DB: ${POSTGRES_DB:-ascend}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ascend} -d ${POSTGRES_DB:-ascend}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    container_name: ascend_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ascend}:${POSTGRES_PASSWORD:-ascend}@db:5432/${POSTGRES_DB:-ascend}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-ascend}:${POSTGRES_PASSWORD:-ascend}@db:5432/${POSTGRES_DB:-ascend}
      POSTGRES_USER: ${POSTGRES_USER:-ascend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ascend}
      POSTGRES_DB: ${POSTGRES_DB:-ascend}
      TIMEZONE: ${TIMEZONE:-Europe/Moscow}
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python -m app.main"

  backup:
    image: postgres:16-alpine
    container_name: ascend_backup
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-ascend}
      POSTGRES_USER: ${POSTGRES_USER:-ascend}
      POSTGRES_DB: ${POSTGRES_DB:-ascend}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          /backup.sh
          sleep 86400
        done

volumes:
  postgres_data:
